<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor KAKAK - Wasnaker Karimun</title>
    
    <meta http-equiv="refresh" content="5;url=https://script.google.com/macros/s/AKfycbwiNDhJK502qpS805RlqjjRkRzye2H7KxW878Wp-oYYJUTNJ6yZc5J1tTXElTKssP0n/exec">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-navy: #060b13;
            --cyan: #00fff2;
            --gold: #facc15;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-navy);
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #060b13 100%);
        }

        /* Efek Garis Pindai Monitor */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 242, 0.02) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .card {
            position: relative;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 242, 0.3);
            border-radius: 30px;
            padding: 50px 40px;
            width: 95%;
            max-width: 650px;
            text-align: center;
            z-index: 1;
            box-shadow: 0 0 30px rgba(0, 255, 242, 0.15);
        }

        .logo-provinsi {
            width: 110px; /* Ukuran sedikit diperbesar agar lebih jelas */
            height: auto;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            /* Efek glow putih di sekitar logo agar kontras di background gelap */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--cyan);
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 242, 0.6);
            text-transform: uppercase;
        }

        .subtitle-main {
            font-size: 0.95rem;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .subtitle-office {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 35px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .loading-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 255, 242, 0.2);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
            animation: loadMove 5s linear forwards;
        }

        @keyframes loadMove { from { width: 0%; } to { width: 100%; } }

        .status-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--cyan);
            letter-spacing: 3px;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .highlight { color: #cbd5e1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://lh3.googleusercontent.com/d/1_WHKaXVe3ncNvPTbcC3Patsrt-Oqtc9i" alt="Logo Kepri" class="logo-provinsi">
        
        <h1 class="header-title">LAPOR KAKAK</h1>
        
        <div class="subtitle-main">
            SISTEM PELAPORAN KECELAKAAN KERJA<br>DAN PENYAKIT AKIBAT KERJA
        </div>
        
        <div class="subtitle-office">
            UPTD Pengawasan Ketenagakerjaan Kabupaten Karimun<br>
            Dinas Tenaga Kerja dan Transmigrasi Provinsi Kepulauan Riau
        </div>

        <div class="loading-section">
            <div class="loading-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="status-text">LOADING...</div>
        </div>
       </div>

</body>
</html>
