<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor KAKAK - Wasnaker Karimun</title>
    
    <meta http-equiv="refresh" content="2.5;url=https://script.google.com/macros/s/AKfycbyVQ645oj9x5JhoL6h4wTWsYYA5CNah4pVo2xLmxo_-pWZbzxLGlpOLkB1X_6RHL8dO/exec">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-navy: #060b13;
            --cyan: #00fff2;
            --gold: #facc15;
            --glass: rgba(0, 255, 242, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-navy);
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #060b13 100%);
        }

        /* Efek Garis Pindai Monitor (Scanlines) */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 242, 0.02) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Kartu Utama dengan Efek Denyut (Breathing Glow) */
        @keyframes breathingGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 242, 0.1), inset 0 0 15px rgba(0, 255, 242, 0.05); border-color: rgba(0, 255, 242, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 242, 0.3), inset 0 0 25px rgba(0, 255, 242, 0.1); border-color: rgba(0, 255, 242, 0.5); }
        }

        .card {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 242, 0.3);
            border-radius: 30px;
            padding: 50px 40px;
            width: 95%;
            max-width: 650px;
            text-align: center;
            z-index: 1;
            animation: breathingGlow 4s infinite ease-in-out;
        }

        .logo-provinsi {
            width: 85px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 242, 0.4));
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--cyan);
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 242, 0.6);
            text-transform: uppercase;
        }

        .subtitle-main {
            font-size: 0.95rem;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .subtitle-office {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 35px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        /* Container Loading */
        .loading-section {
            margin-top: 20px;
            position: relative;
        }

        .loading-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 255, 242, 0.2);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            background-size: 200% 100%;
            box-shadow: 0 0 15px var(--cyan);
            animation: loadMove 2.5s ease-in-out forwards, shimmer 1s infinite linear;
        }

        @keyframes loadMove { from { width: 0%; } to { width: 100%; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .status-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--cyan);
            letter-spacing: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            letter-spacing: 1px;
        }

        .highlight { color: #cbd5e1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://kepriprov.go.id/assets/frontend/img/logo_kepri.png" alt="Logo Kepri" class="logo-provinsi">
        
        <h1 class="header-title">LAPOR KAKAK</h1>
        
        <div class="subtitle-main">
            SISTEM PELAPORAN KECELAKAAN KERJA<br>DAN PENYAKIT AKIBAT KERJA
        </div>
        
        <div class="subtitle-office">
            UPTD Pengawasan Ketenagakerjaan Kabupaten Karimun<br>
            Dinas Tenaga Kerja dan Transmigrasi Provinsi Kepulauan Riau
        </div>

        <div class="loading-section">
            <div class="loading-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="status-text">LOADING...</div>
        </div>

       </div>

</body>
</html>
